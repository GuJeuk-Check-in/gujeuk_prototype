<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gujeuk Prototype Versions</title>
    <style>
      :root {
        --ink: #151515;
        --muted: #706a60;
        --paper: #fffaf0;
        --primary: #176b5d;
        --border: rgba(21, 21, 21, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--ink);
        font-family:
          "Apple SD Gothic Neo",
          "Noto Sans KR",
          system-ui,
          -apple-system,
          sans-serif;
        background: #d9d3c9;
      }

      main {
        width: min(720px, 100%);
        padding: clamp(24px, 5vw, 44px);
        border-radius: 32px;
        background: var(--paper);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.16);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(34px, 6vw, 56px);
        line-height: 1;
        letter-spacing: -0.06em;
      }

      p {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 17px;
        font-weight: 700;
        line-height: 1.6;
      }

      .versions {
        display: grid;
        gap: 14px;
      }

      a,
      .placeholder {
        display: block;
        padding: 22px;
        border: 2px solid var(--border);
        border-radius: 22px;
        text-decoration: none;
        background: #ffffff;
      }

      a {
        color: var(--ink);
      }

      a:hover {
        border-color: var(--primary);
      }

      strong,
      span {
        display: block;
      }

      strong {
        margin-bottom: 6px;
        font-size: 24px;
      }

      span {
        color: var(--muted);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Gujeuk Prototype</h1>
      <p>프로토타입 버전별 진입 화면입니다. 현재까지 작업한 수기 등록 프로토타입은 v1에 있습니다.</p>

      <section class="versions" aria-label="프로토타입 버전 목록">
        <a href="./v1/">
          <strong>v1</strong>
          <span>태블릿 수기 첫 방문 등록 프로토타입</span>
        </a>
        <div class="placeholder">
          <strong>v2</strong>
          <span>다음 실험을 위한 빈 버전 폴더</span>
        </div>
      </section>
    </main>
  </body>
</html>
